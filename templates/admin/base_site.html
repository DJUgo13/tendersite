{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | {{ site_title|default:_('Django site admin') }}{% endblock %}

{% block extrahead %}
{{ block.super }}
<link rel="stylesheet" type="text/css" href="{% static 'core/css/admin_custom.css' %}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<style>
    /* HYPER-AGGRESSIVE LIGHT THEME LOCK (Prevents ALL flicker) */
    :root,
    html,
    body {
        background-color: #ffffff !important;
        background: #ffffff !important;
        color: #000000 !important;
        color-scheme: light !important;

        /* Force light version of all Django internal variables */
        --body-bg: #ffffff !important;
        --body-fg: #000000 !important;
        --header-bg: #202020 !important;
        --header-color: #ffffff !important;
        --breadcrumbs-bg: #ffffff !important;
        --link-fg: #0066cc !important;
        --primary: #0066cc !important;
        --secondary: #f1f1f1 !important;
        --accent: #0066cc !important;
        --darkened-bg: #f8f8f8 !important;
        /* Fixes dark bars in sidebar/search */
        --selected-bg: #e0f0ff !important;
    }

    #theme-toggle,
    .theme-toggle {
        display: none !important;
    }

    /* Neutralize other potentially dark elements */
    .module h2,
    .module caption {
        background: #f8f9fa !important;
        color: #000 !important;
    }
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">
        <i class="bi bi-shield-lock me-2"></i> GLOBAL FOODS ADMIN
    </a>
</h1>
{% endblock %}

{% block nav-global %}{% endblock %}
