<div class="table-responsive">
    <table class="table table-sm table-borderless mb-0">
        <thead class="text-muted small">
            <tr>
                <th>Дата</th>
                <th>Цена</th>
                <th>Статус</th>
            </tr>
        </thead>
        <tbody>
            {% for bid in bids %}
            <tr>
                <td>{{ bid.created_at|date:"d.m H:i:s" }}</td>
                <td><strong>{{ bid.price }} ₽</strong></td>
                <td>
                    {% if bid.is_active %}
                    <span class="badge bg-success-subtle text-success border border-success-subtle">Активна</span>
                    {% else %}
                    <span class="badge bg-secondary-subtle text-secondary">В архиве</span>
                    {% endif %}
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="text-center text-muted">История пуста</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
